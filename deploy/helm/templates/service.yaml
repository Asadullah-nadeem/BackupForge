apiVersion: v1
kind: Service
metadata:
  name: {{ include "BackupForge.fullname" . }}-service
  namespace: {{ include "BackupForge.namespace" . }}
  labels:
    {{- include "BackupForge.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "BackupForge.selectorLabels" . | nindent 4 }}
---
{{- if .Values.service.headless.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "BackupForge.fullname" . }}-headless
  namespace: {{ include "BackupForge.namespace" . }}
  labels:
    {{- include "BackupForge.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "BackupForge.selectorLabels" . | nindent 4 }}
{{- end }}
